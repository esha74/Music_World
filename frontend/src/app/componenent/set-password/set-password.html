<div class="setpass-container">
  <form [formGroup]="setPassForm" (ngSubmit)="onSubmit()" novalidate class="setpass-form">

    <div class="form-group mb-3">
      <label for="password" class="form-label">Password</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        class="form-control"
        placeholder="Enter password"
      />
      <div *ngIf="setPassForm.get('password')?.touched && setPassForm.get('password')?.invalid" class="text-danger mt-1">
        <small *ngIf="setPassForm.get('password')?.errors?.['required']">Password is required (min 6 characters).</small>
        <small *ngIf="setPassForm.get('password')?.errors?.['passwordStrength']">
            Password must contain uppercase, lowercase, number, and special character.
        </small>
      </div>
    </div>

    <div class="form-group mb-3">
      <label for="confirmPassword" class="form-label">Confirm Password</label>
      <input
        id="confirmPassword"
        type="password"
        formControlName="confirmPassword"
        class="form-control"
        placeholder="Confirm password"
      />
      <div *ngIf="setPassForm.errors?.['mismatch'] && setPassForm.get('confirmPassword')?.touched" class="text-danger mt-1">
        <small>Passwords do not match.</small>
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
      {{ loading ? 'Setting Password...' : 'Set Password' }}
    </button>

  </form>
</div>
