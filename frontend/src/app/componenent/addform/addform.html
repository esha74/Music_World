
 
<div class="music-container">
 <div class="page-container" >
  <a routerLink="/list" class="back-icon-link" >
  <img src="assets/images/icon1.png" alt="Back" width="50" height="50" />
</a>
</div>
  <form [formGroup]="MusicForm" (ngSubmit)="onsubmit()" class="music-form w-50 mt-5 p-4 border rounded shadow-lg">


    <h2 class="form-title">🎵 Add Your Music</h2>

    <!-- Music Title -->
    <div class="mt-3">
      <label for="title">Music Title:</label>
      <input type="text" class="form-control" formControlName="title" placeholder="Enter Your Music Title">
      <div *ngIf="MusicForm.get('title')?.touched && MusicForm.get('title')?.invalid" class="text-danger small">
        <div *ngIf="MusicForm.get('title')?.errors?.['required']">Title is required.</div>
      </div>
    </div>

    <!-- Artist -->
    <div class="mt-3">
      <label for="artist">Music Artist:</label>
      <input type="text" class="form-control" formControlName="artist" placeholder="Enter Your Music Artist">
      <div *ngIf="MusicForm.get('artist')?.touched && MusicForm.get('artist')?.invalid" class="text-warning small">
        <div *ngIf="MusicForm.get('artist')?.errors?.['required']">Artist is required.</div>
      </div>
    </div>

    <!-- Year -->
    <div class="mt-3">
      <label for="year">Music Year:</label>
      <input type="text" class="form-control" formControlName="year" placeholder="Enter Your Music Year">
      <div *ngIf="MusicForm.get('year')?.touched && MusicForm.get('year')?.invalid" class="text-warning small">
        <div *ngIf="MusicForm.get('year')?.errors?.['required']">Year is required.</div>
        <div *ngIf="MusicForm.get('year')?.errors?.['pattern']">Enter year in proper format (e.g., 2024).</div>
      </div>
    </div>

    <!-- Genre -->
    <div class="mt-3">
      <label for="genre">Music Genre:</label>
      <input type="text" class="form-control" formControlName="genre" placeholder="Enter Your Music Genre">
      <div *ngIf="MusicForm.get('genre')?.touched && MusicForm.get('genre')?.invalid" class="text-warning small">
        <div *ngIf="MusicForm.get('genre')?.errors?.['required']">Genre is required.</div>
      </div>
    </div>

    <!-- 🔥 Image URL Field -->
    <div class="mt-3">
      <label for="image">Album Art (Image URL):</label>
      <input type="text" class="form-control" formControlName="image" placeholder="Enter Image URL">
      <div *ngIf="MusicForm.get('image')?.touched && MusicForm.get('image')?.invalid" class="text-warning small">
        <div *ngIf="MusicForm.get('image')?.errors?.['required']">Image URL is required.</div>
        <div *ngIf="MusicForm.get('image')?.errors?.['pattern']">Enter a valid image URL.</div>
      </div>
    </div>

    <!-- 🔥 Audio URL Field -->
    <div class="mt-3">
      <label for="youtube">YouTube Link:</label>
      <input type="text" class="form-control" formControlName="audio" placeholder="Enter YouTube Video URL">
      <div *ngIf="MusicForm.get('audio')?.touched && MusicForm.get('audio')?.invalid" class="text-danger small">
        <div *ngIf="MusicForm.get('audio')?.errors?.['required']">YouTube link is required.</div>
        <div *ngIf="MusicForm.get('audio')?.errors?.['pattern']">Enter a valid YouTube URL.</div>
      </div>
    </div>


    <!-- Submit -->
    <button type="submit" class="btn btn-light mt-4 w-100" [disabled]="MusicForm.invalid">
      🎶 Submit
    </button>
  </form>
</div>
