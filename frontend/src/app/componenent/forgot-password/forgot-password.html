<div class="form-center-container">
  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="p-4 forgot-form" style="max-width: 400px; width: 100%;">
    <div class="form-group mb-3">
      <label for="email" class="form-label">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        class="form-control"
        placeholder="Enter your email"
        autocomplete="email"
        spellcheck="false"
      />
      <div *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched" class="text-danger mt-1">
        <small *ngIf="forgotForm.get('email')?.errors?.['required']">Email is required.</small>
        <small *ngIf="forgotForm.get('email')?.errors?.['email']">Invalid email format.</small>
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading">
      {{ isLoading ? 'Sending...' : 'Send OTP' }}
    </button>
  </form>
</div>
