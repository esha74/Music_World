<p>change-password works!</p>
<div class="container mt-5 col-md-6">
  <h2 class="mb-4 text-center">🔐 Change Password</h2>

  <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">

<!-- Display user's saved question -->
<div class="form-group mb-3">
  <label>Security Question</label>
  <input type="text" class="form-control" [value]="securityQuestion" readonly />
</div>


    <div class="form-group mb-3">
      <label for="securityAnswer">Security Answer</label>
      <input type="text" id="securityAnswer" formControlName="securityAnswer" class="form-control" placeholder="Enter your security answer" />
      <div *ngIf="changePasswordForm.get('securityAnswer')?.touched && changePasswordForm.get('securityAnswer')?.invalid" class="text-danger">
        Security answer is required.
      </div>
    </div>

    <div class="form-group mb-4">
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" formControlName="newPassword" class="form-control" placeholder="Enter new password" />
      <div *ngIf="changePasswordForm.get('newPassword')?.touched && changePasswordForm.get('newPassword')?.invalid" class="text-danger">
        Password must be at least 6 characters.
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100" [disabled]="changePasswordForm.invalid">Change Password</button>
  </form>
</div>
