<div class="login-wrapper">
  <div class="login-container">
    <!-- Left Side: Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onlogin()" class="login-form">
      <div class="logo-container">
        <img src="assets/images/logo2.png" alt="Music Logo" class="music-logo"
          style="width: 80px;border-radius: 50%;" />
        <h2 class="form-title">Login to Your Music World</h2>
      </div>

      <!-- Username -->
      <div class="mt-3">
        <input type="text" formControlName="username" placeholder="Enter Your Username" class="form-control" />
        <div *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid"
          class="text-warning small">
          <div *ngIf="loginForm.get('username')?.errors?.['required']">Username is required.</div>
        </div>
      </div>

      <!-- Password -->
      <div class="mt-3">
        <input type="password" formControlName="password" placeholder="Enter Your Password" class="form-control" />
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          class="text-warning small">
          <div *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</div>
        </div>
      </div>

      <!-- <div class="mt-3">
        <select formControlName="role" class="form-control">
          <option value="" disabled selected>Select Role</option>
          <option value="User">User</option>
          <option value="Admin">Admin</option>
        </select>
        <div *ngIf="loginForm.get('role')?.touched && loginForm.get('role')?.invalid" class="text-warning small">
          <div *ngIf="loginForm.get('role')?.errors?.['required']">Role is required.</div>
        </div>
      </div> -->

      <!-- Login Button -->
      <button type="submit" class="btn btn-music w-100 mt-4" [disabled]="isLoading">Login</button>
      <p class="text-center mt-2">

        <span class="forgot-password-link" (click)="goForgotPassword()"class="register-link">
          Forgot Password
        </span>
      </p>

      <p class="text-center mt-3">
        New User? <span class="register-link" (click)="goRegister()">Click Here to Register</span>
      </p>

      <div *ngIf="errorMessage" class="alert alert-danger text-center mt-3">
        {{ errorMessage }}
      </div>
    </form>

    <!-- Right Side: Image -->
    <div class="login-image">
      <img src="https://images.unsplash.com/photo-1525018923-1ebe8261a6a6?q=80&w=1080&fit=crop" alt="Concert Image" />
    </div>
  </div>
</div>
