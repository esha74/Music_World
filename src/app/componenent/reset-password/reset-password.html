<div class="form-center-container">
  <form [formGroup]="resetForm" (ngSubmit)="onReset()" class="resetform p-4" style="max-width: 400px; width: 100%; margin: auto;">
    <div class="form-group mb-3">
      <label for="email" class="form-label">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        class="form-control"
        placeholder="Email"
        readonly
      />
    </div>

    <div class="form-group mb-3">
      <label for="otp" class="form-label">Enter OTP</label>
      <input
        id="otp"
        type="text"
        maxlength="6"
        formControlName="otp"
        class="form-control"
        placeholder="Enter 6-digit OTP"
      />
      <div *ngIf="resetForm.get('otp')?.invalid && resetForm.get('otp')?.touched" class="text-danger mt-1">
        <small *ngIf="resetForm.get('otp')?.errors?.['required']">OTP is required.</small>
        <small *ngIf="resetForm.get('otp')?.errors?.['minlength'] || resetForm.get('otp')?.errors?.['maxlength']">
          OTP must be 6 characters.
        </small>
      </div>
    </div>

    <div class="form-group mb-3">
      <label for="newPassword" class="form-label">New Password</label>
      <input
        id="newPassword"
        type="password"
        formControlName="newPassword"
        class="form-control"
        placeholder="Enter new password"
      />
      <div *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched" class="text-danger mt-1">
        <small *ngIf="resetForm.get('newPassword')?.errors?.['required']">New password is required.</small>
        <small *ngIf="resetForm.get('newPassword')?.errors?.['minlength']">Password must be at least 6 characters.</small>
        <div *ngIf="resetForm.get('newPassword')?.errors?.['passwordStrength']">
          Password must contain uppercase, lowercase, number, and special character.
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading">
      {{ isLoading ? 'Resetting...' : 'Reset Password' }}
    </button>
  </form>
</div>
